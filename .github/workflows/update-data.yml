name: Update race data

on:
  # The "cloud robot" checks every 4 hours, every day. Running daily (not just
  # weekends) matters: a Sunday race becomes eligible a few hours after it
  # finishes, and this guarantees a run happens then - and again the next day -
  # regardless of the race's timezone. Runs are ~15s and free on public repos,
  # so the extra weekday checks (which just no-op) cost nothing.
  schedule:
    - cron: "0 */4 * * *"
  # The manual "Run workflow" button (works from the GitHub app on a phone).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch any newly completed races
        working-directory: scripts
        run: python update_data.py 2026

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data, nothing to commit."
          else
            git commit -m "Update race data (automated)"
            git push
          fi
